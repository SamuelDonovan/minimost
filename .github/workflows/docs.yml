name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and doc dependencies
        run: pip install -e ".[docs]"

      - name: Build HTML docs
        run: make -C docs html SPHINXOPTS="-W --keep-going"
        # -W  treats warnings as errors (catches broken cross-references, etc.)
        # --keep-going  reports all errors rather than stopping on the first

      - name: Zip docs
        run: zip -r docs.zip docs/_build/html/

      - name: Delete previous docs artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate --jq '.artifacts[] | select(.name=="html-docs") | .id')
          for id in $ids; do
            gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE || true
          done

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs.zip

  deploy:
    name: Trigger Read the Docs build
    runs-on: ubuntu-latest
    needs: build
    # Only deploy when a commit lands on main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger RTD build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          # Change this to your Read the Docs project slug
          # (the part of the URL after https://readthedocs.org/projects/)
          RTD_PROJECT_SLUG: minimost
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Authorization: Token ${RTD_TOKEN}" \
            "https://readthedocs.org/api/v3/projects/${RTD_PROJECT_SLUG}/versions/latest/builds/"
