name: pip-audit

on:
  push:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit
