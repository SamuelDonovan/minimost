name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install build black
      - run: black --check src/
      - run: python -m build --wheel
      - name: Install doc dependencies
        if: github.ref == 'refs/heads/main'
        run: pip install -e ".[docs]"
      - name: Build and zip docs
        if: github.ref == 'refs/heads/main'
        run: |
          make -C docs html SPHINXOPTS="-W --keep-going"
          zip -r docs.zip docs/_build/html/
      - name: Publish dev release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          gh release create dev dist/*.whl docs.zip \
            --title "Latest Dev Build" \
            --notes "Built from [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            --prerelease
