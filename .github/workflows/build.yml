name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install build black
      - run: black --check src/
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: minimost-wheel
          path: dist/*.whl
