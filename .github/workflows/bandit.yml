name: Bandit

on:
  push:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # Pinned so CI and the pre-commit hook scan with the same bandit; keep
      # this version in sync with .pre-commit-config.yaml.
      - run: pip install bandit==1.9.4
      - run: bandit -r -c pyproject.toml src/
