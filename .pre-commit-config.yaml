repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        # Use a pre-commit-managed venv with a pinned black rather than
        # `language: system`, which runs whatever black happens to be on PATH
        # when git invokes the hook (often a different version than the venv,
        # producing formatting that disagrees with CI/local). Keep this version
        # in sync with build.yml and the pyproject `dev` extra.
        language: python
        additional_dependencies: ["black==26.3.1"]
        types: [python]
      - id: bandit
        name: bandit
        # Scan the whole src/ tree (honouring [tool.bandit] in pyproject) rather
        # than only the staged files, so it matches the CI invocation exactly.
        # Pinned in a pre-commit-managed venv for the same reason as black; keep
        # this version in sync with bandit.yml.
        entry: bandit -r -c pyproject.toml src/
        language: python
        additional_dependencies: ["bandit==1.9.4"]
        types: [python]
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, css, json, markdown, yaml]
      # Test suites run via `language: system` (they need the real project
      # environment — the installed package + flask, and node_modules — not an
      # isolated venv). `pass_filenames: false` runs the whole suite instead of
      # passing only the staged files to the runner.
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
      - id: jest
        name: jest
        entry: npx jest
        language: system
        types_or: [javascript]
        pass_filenames: false
