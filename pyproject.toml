[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "minimost"
dynamic = ["version"]
description = "Lightweight self-hosted collaboration platform for messaging"
readme = "README.md"
requires-python = ">=3.6"
license = {file = "LICENSE"}
dependencies = [
    "flask",
]

[project.optional-dependencies]
dev = ["black", "pytest", "pytest-cov", "vermin"]
docs = ["sphinx>=7", "sphinx-rtd-theme>=2", "sphinxcontrib-httpdomain>=1.8"]

[project.scripts]
minimost = "minimost.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "minimost._version.__version__"}

[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the src/ layout on sys.path so `import minimost` works without installing
# the package (pytest >= 7 honours this ini option).
pythonpath = ["src"]
addopts = "--cov=src/minimost --cov-report=xml --cov-report=term-missing"

[tool.coverage.run]
source = ["src/minimost"]

[tool.bandit]
exclude_dirs = ["build", "dist"]

[tool.setuptools.package-data]
minimost = [
    "templates/*",
    "static/*",
    "static/reactions/*",
    "settings.json",
]
