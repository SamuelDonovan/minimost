<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MiniMost</title>
    <base href="minimost">
    <meta name="description" content="Not skype">
    <link rel="stylesheet" href="../static/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
</head>
<body>

<!-- expose current user to JS -->
<script>
    const CURRENT_USER = "{{ session['user'] }}";
</script>

<div id="sidebar">
    <div id="sidebar-static">
        <button id="new-dm-btn">+ New DM</button>
        <hr>
    </div>

    <div id="sidebar-dynamic"></div>
</div>

<div id="main">
    <div id="topbar">
        <div>
            User: <b>{{ session["user"] }}</b>
            <a href="/logout">(logout)</a>
        </div>

        <button id="msg-search-btn">Search</button>

        <div>
            Channel: <span id="chan"></span>
        </div>
    </div>

    <div id="chat"></div>

    <div id="input" class="dropzone">
        <div id="image-preview"></div>
        <textarea
            id="msg"
            rows="3"
            placeholder="Type a message…"
            style="width:80%"
        ></textarea>

        <input
            type="file"
            id="fileInput"
            multiple
            accept="image/*"
            hidden
        >

        <button onclick="fileInput.click()">📎</button>
        <button onclick="send()">Send</button>
    </div>

</div>

<!-- DM Modal -->
<div id="dm-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Start Direct Message</h3>

        <input
            id="dm-users"
            placeholder="Enter usernames (comma separated)"
        />

        <div class="modal-actions">
            <button id="dm-start">Start</button>
            <button id="dm-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Search Modal -->
<div id="msg-search-modal" class="modal">
    <div class="modal-content">
        <input type="text" id="msg-search-input" placeholder="Search messages…">
        <div id="msg-search-results"></div>
        <button id="msg-search-close">Close</button>
    </div>
</div>

<!-- keyboard handling -->
<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("image-preview");
const msgBox = document.getElementById("msg");
const dropzone = document.getElementById("input");

document.getElementById("msg").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

document.addEventListener("load", e => {
    if (e.target.tagName === "IMG") {
        e.target.classList.add("loaded");
    }
}, true);

msgBox.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

msgBox.addEventListener("paste", e => {
    const items = e.clipboardData?.items || [];
    const files = [];

    for (const item of items) {
        if (item.type.startsWith("image/")) {
            files.push(item.getAsFile());
        }
    }

    if (files.length) {
        e.preventDefault();
        addFiles(files);
    }
});

fileInput.addEventListener("change", () => {
    addFiles([...fileInput.files]);
    fileInput.value = "";
});

dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");

    addFiles(e.dataTransfer.files);
});


// Core state
let channel = "general";
let lastTs = 0;
let unread = new Set();
const seen = new Set();
let lastRenderedDate = null;

let pendingFiles = [];

// Preview Renderer
function addFiles(files) {
    for (const file of files) {
        if (!file.type.startsWith("image/")) continue;

        pendingFiles.push(file);

        const div = document.createElement("div");
        div.className = "preview-img";

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        const btn = document.createElement("button");
        btn.textContent = "×";
        btn.className = "remove-img";
        btn.onclick = () => {
            pendingFiles = pendingFiles.filter(f => f !== file);
            div.remove();
        };

        div.appendChild(img);
        div.appendChild(btn);
        preview.appendChild(div);
    }
}

// User color
function userColor(name) {
    let h = 0;
    for (let c of name) h = c.charCodeAt(0) + ((h << 5) - h);
    return `hsl(${Math.abs(h) % 360}, 65%, 55%)`;
}

// Sidebar loading
function loadSidebar() {
    const sb = document.getElementById("sidebar-dynamic");
    sb.innerHTML = "";

    Promise.all([
        fetch("/channels").then(r => r.json()),
        fetch("/dms").then(r => r.json()),
        fetch("/online_users").then(r => r.json())
    ]).then(([chs, dms, online]) => {

        // Channels
        const chTitle = document.createElement("b");
        chTitle.innerText = "Channels";
        sb.appendChild(chTitle);

        chs.forEach(c => {
            sidebarEntry("# " + c, c);
        });

        sb.appendChild(document.createElement("hr"));

        // DMs
        const dmTitle = document.createElement("b");
        dmTitle.innerText = "Direct Messages";
        sb.appendChild(dmTitle);

        dms.forEach(dm => {
            const label = "@ " + dm.users.join(", ");
            sidebarEntry(label, dm.channel, online);
        });

        // 🔑 ensure highlight is correct after rebuild
        updateSidebarActive();
    });
}

function refreshPresence() {
    fetch("/online_users")
        .then(r => r.json())
        .then(online => {
            document.querySelectorAll("#sidebar-dynamic [data-channel^='dm:']").forEach(el => {
                const users = el.dataset.channel.split(":").slice(1).filter(u => u !== CURRENT_USER);
                const isOnline = users.some(u => online.includes(u));

                // Rebuild label with dot
                const baseLabel = "@ " + users.join(", ");
                el.textContent = baseLabel + (isOnline ? " ●" : " ○");

                // Optional: keep color consistent
                el.style.color = isOnline ? "#6cf" : "#888";
            });
        });
}

function sidebarEntry(label, channelName, online = []) {
    const sb = document.getElementById("sidebar-dynamic");

    const d = document.createElement("div");

    // 🔑 REQUIRED for highlighting
    d.className = "sidebar-item";
    d.dataset.channel = channelName;

    // Optional presence indicator for DMs
    if (channelName.startsWith("dm:")) {
        const users = channelName
            .split(":")
            .slice(1)
            .filter(u => u !== CURRENT_USER);

        const isOnline = users.some(u => online.includes(u));
        d.textContent = label + (isOnline ? " ●" : " ○");
        d.style.color = isOnline ? "#6cf" : "#888";
    } else {
        d.textContent = label;
    }

    d.onclick = () => switchChannel(channelName);

    sb.appendChild(d);
}

// Switch Channel
function updateSidebarActive() {
    const items = document.querySelectorAll(
        "#sidebar-dynamic [data-channel]"
    );

    items.forEach(el => {
        if (el.dataset.channel === channel) {
            el.classList.add("active");
        } else {
            el.classList.remove("active");
        }
    });
}

function switchChannel(c) {
    if (channel == c) return;
    channel = c;
    lastTs = 0;
    lastRenderedDate = null;
    seen.clear();
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chan").innerText = c;
    fetchMessages();
    loadSidebar();
}

// Fetch Messages
function fetchMessages() {
    fetch(`/messages/${channel}?after=${lastTs}`)
        .then(r => {
            if (!r.ok) return null;
            return r.json();
        })
        .then(data => {
            const chat = document.getElementById("chat");

            data.forEach(m => {
                const msgDate = new Date(m.ts * 1000);
                const dateKey = msgDate.toDateString();

                if (dateKey !== lastRenderedDate) {
                    const divider = document.createElement("div");
                    divider.className = "date-divider";
                    divider.textContent = msgDate.toLocaleDateString(undefined, {
                        weekday: "long",
                        year: "numeric",
                        month: "long",
                        day: "numeric"
                    });

                    chat.appendChild(divider);
                    lastRenderedDate = dateKey;
                }


                const d = document.createElement("div");
                d.className = "msg";
                d.id = `msg-${m.id}`;

                const time = msgDate.toLocaleTimeString([], {
                    hour: "numeric",
                    minute: "2-digit"
                });

                const color = userColor(m.sender);

                let html = `
                    <span class="time">[${time}]</span>
                    <span class="user" style="color:${color}">${m.sender}</span>: `;

                // ✅ Only render text if it exists
                if (m.content && m.content.trim()) {
                    html += ` <span class="text">${linkify(m.content)}</span>
                    `;
                }

                // ✅ Render images in the SAME message bubble
                if (m.filename) {
                    const files = m.filename.split(",");
                    for (const f of files) {
                        if (f.match(/\.(png|jpg|jpeg|gif|webp)$/i)) {
                            html += `
                                <a href="/files/${f}" target="_blank">
                                    <img
                                        src="/files/${f}"
                                        class="chat-image"
                                        loading="lazy"
                                    >
                                </a>
                            `;
                        }
                    }
                }

                d.innerHTML = html;

                chat.appendChild(d);
                lastTs = Math.max(lastTs, m.ts);
            });

            if (data.length) {
                chat.scrollTop = chat.scrollHeight;
            }
        });
}

// Edit message
function editMsg(id, text) {
    fetch(`/edit/${id}`, {
        method: "POST",
        body: new URLSearchParams({text})
    });
}

// Send messages
function send() {
    const text = msgBox.value.trim();

    if (!text && pendingFiles.length === 0) return;

    const form = new FormData();
    form.append("text", text);

    pendingFiles.forEach(f => {
        form.append("files", f);
    });

    fetch(`/send/${channel}`, {
        method: "POST",
        body: form
    });

    msgBox.value = "";
    pendingFiles = [];
    preview.innerHTML = "";
}

// Direct Messages
const dmModal = document.getElementById("dm-modal");

document.getElementById("new-dm-btn").onclick = () => {
    dmModal.style.display = "block";
    dm-users.focus();
};

document.getElementById("dm-cancel").onclick = () => {
    dmModal.style.display = "none";
};

document.getElementById("dm-start").onclick = () => {
    const raw = document.getElementById("dm-users").value.trim();
    if (!raw) return;

    const users = raw
        .split(",")
        .map(u => u.trim())
        .filter(Boolean);

    if (!users.length) return;

    // Always include yourself
    if (!users.includes(CURRENT_USER)) {
        users.push(CURRENT_USER);
    }

    users.sort(); // IMPORTANT: consistent channel naming

    const dmChannel = "dm:" + users.join(":");

    dmModal.classList.add("hidden");
    document.getElementById("dm-users").value = "";

    switchChannel(dmChannel);
    dmModal.style.display = "none";
};

// Message search
const searchModal = document.getElementById("msg-search-modal");
const searchInput = document.getElementById("msg-search-input");
const searchResults = document.getElementById("msg-search-results");

document.getElementById("msg-search-btn").onclick = () => {
    searchModal.style.display = "block";
    searchInput.value = "";
    searchResults.innerHTML = "";
    searchInput.focus();
};

document.getElementById("msg-search-close").onclick = () => {
    searchModal.style.display = "none";
};

// Close modal on outside click
window.onclick = e => {
    if (e.target === searchModal) searchModal.style.display = "none";
    if (e.target === dmModal) dmModal.style.display = "none";
};

// Clickable links
function linkify(text) {
    // Escape HTML first (important for security)
    const div = document.createElement("div");
    div.textContent = text;
    let safe = div.innerHTML;

    // Regex for URLs
    const urlRegex = /((https?:\/\/|www\.)[^\s]+)/g;

    return safe.replace(urlRegex, url => {
        let href = url;
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
}

// Debounce helper
function debounce(func, wait = 200) {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
    };
}

// Live search
searchInput.addEventListener("input", debounce(() => {
    const q = searchInput.value.trim();
    if (!q) {
        searchResults.innerHTML = "";
        return;
    }

    fetch(`/search_messages?q=${encodeURIComponent(q)}`)
        .then(r => r.json())
        .then(data => {
            searchResults.innerHTML = "";

            data.forEach(msg => {
                const d = document.createElement("div");
                const time = new Date(msg.ts*1000).toLocaleTimeString();
                d.innerHTML = `[${time}] <b>${msg.sender}</b>: ${msg.content}`;
                d.onclick = () => {
                    searchModal.style.display = "none";

                    // switch to the message's channel
                    switchChannel(msg.channel);

                    // scroll to the message once loaded
                    setTimeout(() => {
                        const el = document.getElementById(`msg-${msg.id}`);
                        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
                    }, 200); // delay to ensure messages have loaded
                };
                searchResults.appendChild(d);
            });
        });
}, 250));

// Starup
document.addEventListener("DOMContentLoaded", () => {
    loadSidebar();
    switchChannel(channel);
    setInterval(fetchMessages, 500);
    setInterval(refreshPresence, 10000);

});

</script>
</body>
</html>
