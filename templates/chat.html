<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MiniMost</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #1e1e1e;
    color: #ddd;
    display: flex;
    height: 100vh;
}
#topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #2d2d2d;
    padding: 6px 10px;
    border-bottom: 1px solid #444;
}
#topbar input, #topbar button {
    margin-left: 4px;
}
#sidebar {
    width: 200px;
    background: #252526;
    padding: 10px;
}
#sidebar div {
    padding: 6px;
    cursor: pointer;
}
#sidebar div.active {
    background: #007acc;
}
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}
.msg {
    margin: 2px 0;
    font-family: system-ui, sans-serif;
}

.time {
    color: #888;
    margin-right: 4px;
}

.user {
    font-weight: 600;
    margin-right: 4px;
}

.text {
    white-space: pre-wrap;
}
button, input {
    background: #2d2d2d;
    color: #ddd;
    border: 1px solid #444;
}
#input {
    padding: 10px;
}
a { color: #9cdcfe; }
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
    <div id="topbar">
        <div>
            User: <b>{{ session["user"] }}</b>
            <a href="/logout">(logout)</a>
        </div>

        <div>
            Channel: <span id="chan"></span>
        </div>

        <div>
            DM:
            <input id="dm_user" placeholder="username" style="width:90px">
            <button onclick="startDM()">Go</button>
        </div>
    </div>

    <div id="chat"></div>

    <div id="input">
        <input id="msg" style="width:60%">
        <input type="file" id="file">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let channel = "general";
let lastTs = 0;

function updateDMPresence() {
    fetch("/online_users")
        .then(r => r.json())
        .then(onlineUsers => {
            const dmDivs = document.querySelectorAll("#sidebar div[data-channel^='dm:']");
            dmDivs.forEach(d => {
                const channelId = d.dataset.channel;
                // extract the other username from dm_channel
                const parts = channelId.split(":"); // ["dm", "alice", "bob"]
                const user = parts[1] === "{{ session['user'] }}" ? parts[2] : parts[1];
                const online = onlineUsers.includes(user);

                // update text and color
                d.innerText = "@ " + user + (online ? " ●" : " ○");
                d.style.color = online ? "#6cf" : "#888";
            });
        });
}

function updateSidebarActive() {
    const divs = document.querySelectorAll("#sidebar div");
    divs.forEach(d => {
        d.classList.remove("active");
        if (d.dataset.channel === channel) {
            d.classList.add("active");
        }
    });
}

function loadChannels() {
    const sb = document.getElementById("sidebar");
    sb.innerHTML = "";

    const chTitle = document.createElement("b");
    chTitle.innerText = "Channels";
    sb.appendChild(chTitle);

    const dmTitle = document.createElement("b");
    dmTitle.innerText = "Direct Messages";

    Promise.all([
        fetch("/channels").then(r => r.json()),
        fetch("/dms").then(r => r.json()),
        fetch("/online_users").then(r => r.json())
    ]).then(([chs, dms, onlineUsers]) => {
        // Render normal channels
        chs.forEach(c => {
            const d = document.createElement("div");
            d.innerText = "# " + c;
            d.dataset.channel = c;
            d.className = (c === channel) ? "active" : "";
            d.onclick = () => switchChannel(c);
            sb.appendChild(d);
        });

        // DM section
        const hr = document.createElement("hr");
        sb.appendChild(hr);
        sb.appendChild(dmTitle);

        dms.forEach(dm => {
            const d = document.createElement("div");
            const online = onlineUsers.includes(dm.user);
            d.innerText = "@ " + dm.user + (online ? " ●" : " ○");
            d.style.color = online ? "#6cf" : "#888";
            d.dataset.channel = dm.channel;
            d.className = (dm.channel === channel) ? "active" : "";
            d.onclick = () => switchChannel(dm.channel);
            sb.appendChild(d);
        });
    });
}

function startDM() {
    const u = document.getElementById("dm_user").value.trim();
    if (!u) return;
    window.location = "/dm/" + encodeURIComponent(u);
}

function channelLabel(c) {
    if (c.startsWith("dm:")) {
        return "@ " + c.split(":").find(x => x !== "{{ session['user'] }}");
    }
    return "# " + c;
}

function switchChannel(c) {
    channel = c;
    lastTs = 0;
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chan").innerText = channelLabel(c);
    fetchMessages();
    updateSidebarActive()
}

function userColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }

    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 65%, 55%)`;
}

const seen = new Set();

function fetchMessages() {
    fetch(`/messages/${channel}?since=${lastTs}`)
        .then(r => r.json())
        .then(data => {
            const chat = document.getElementById("chat");

            data.forEach(m => {
                const key = `${m.sender}:${m.ts}`;
                if (seen.has(key)) return;
                seen.add(key);

                const d = document.createElement("div");
                d.className = "msg";

                const time = new Date(m.ts * 1000).toLocaleTimeString();
                const color = userColor(m.sender);

                d.innerHTML = `
                    <span class="time">[${time}]</span>
                    <span class="user" style="color:${color}">
                        ${m.sender}
                    </span>:
                    <span class="text">${m.content}</span>
                `;

                chat.appendChild(d);
                lastTs = Math.max(lastTs, m.ts);
            });

            if (data.length > 0) {
                chat.scrollTop = chat.scrollHeight;
            }
        });
}

function send() {
    const text = document.getElementById("msg").value;
    const file = document.getElementById("file").files[0];

    if (!text && !file) return; // prevent empty sends

    const form = new FormData();
    form.append("text", text);
    if (file) form.append("file", file);

    fetch(`/send/${channel}`, {method:"POST", body: form});

    document.getElementById("msg").value = "";
    document.getElementById("file").value = "";
}

function editMsg(id) {
    const span = document.getElementById("text-" + id);
    const old = span.innerText;
    const input = document.createElement("input");
    input.value = old;
    input.onblur = ()=>{
        fetch(`/edit/${channel}/${id}`, {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({text: input.value})
        });
        span.innerText = input.value;
        span.style.display = "inline";
        input.remove();
    };
    span.style.display = "none";
    span.parentNode.insertBefore(input, span);
    input.focus();
}

document.addEventListener("DOMContentLoaded", () => {
    if (!channel) channel = "general";
    loadChannels();
    switchChannel(channel);
    setInterval(() => {
        updateDMPresence();
        updateSidebarActive();
    }, 10000);
    setInterval(() => {
        fetchMessages();
    }, 500);

});
</script>
</body>
</html>
