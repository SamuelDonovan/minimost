<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MiniMost</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

<!-- expose current user to JS -->
<script>
    const CURRENT_USER = "{{ session['user'] }}";
</script>

<div id="sidebar">
    <div id="sidebar-static">
        <button id="new-dm-btn">+ New DM</button>
        <hr>
    </div>

    <div id="sidebar-dynamic"></div>
</div>

<div id="main">
    <div id="topbar">
        <div>
            User: <b>{{ session["user"] }}</b>
            <a href="/logout">(logout)</a>
        </div>

        <div>
            Channel: <span id="chan"></span>
        </div>
    </div>

    <div id="chat"></div>

    <div id="input">
        <!-- textarea allows Enter / Shift+Enter -->
        <textarea
            id="msg"
            rows="3"
            placeholder="Type a message…"
            style="width:60%"
        ></textarea>

        <button onclick="send()">Send</button>
    </div>
</div>

<!-- DM Modal -->
<div id="dm-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Start Direct Message</h3>

        <input
            id="dm-users"
            placeholder="Enter usernames (comma separated)"
        />

        <div class="modal-actions">
            <button id="dm-start">Start</button>
            <button id="dm-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- keyboard handling -->
<script>
document.getElementById("msg").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

// Core state
let channel = "general";
let lastTs = 0;
let unread = new Set();
const seen = new Set();

// User color
function userColor(name) {
    let h = 0;
    for (let c of name) h = c.charCodeAt(0) + ((h << 5) - h);
    return `hsl(${Math.abs(h) % 360}, 65%, 55%)`;
}

// Sidebar loading
function loadSidebar() {
    const sb = document.getElementById("sidebar-dynamic");
    sb.innerHTML = "";

    Promise.all([
        fetch("/channels").then(r => r.json()),
        fetch("/dms").then(r => r.json()),
        fetch("/online_users").then(r => r.json())
    ]).then(([chs, dms, online]) => {

        // Channels
        const chTitle = document.createElement("b");
        chTitle.innerText = "Channels";
        sb.appendChild(chTitle);

        chs.forEach(c => {
            sidebarEntry("# " + c, c);
        });

        sb.appendChild(document.createElement("hr"));

        // DMs
        const dmTitle = document.createElement("b");
        dmTitle.innerText = "Direct Messages";
        sb.appendChild(dmTitle);

        dms.forEach(dm => {
            const label = "@ " + dm.users.join(", ");
            sidebarEntry(label, dm.channel, online);
        });

        // 🔑 ensure highlight is correct after rebuild
        updateSidebarActive();
    });
}

function sidebarEntry(label, channelName, online = []) {
    const sb = document.getElementById("sidebar-dynamic");

    const d = document.createElement("div");

    // 🔑 REQUIRED for highlighting
    d.className = "sidebar-item";
    d.dataset.channel = channelName;

    // Optional presence indicator for DMs
    if (channelName.startsWith("dm:")) {
        const users = channelName
            .split(":")
            .slice(1)
            .filter(u => u !== CURRENT_USER);

        const isOnline = users.some(u => online.includes(u));
        d.textContent = label + (isOnline ? " ●" : " ○");
        d.style.color = isOnline ? "#6cf" : "#888";
    } else {
        d.textContent = label;
    }

    d.onclick = () => switchChannel(channelName);

    sb.appendChild(d);
}

// Switch Channel
function updateSidebarActive() {
    const items = document.querySelectorAll(
        "#sidebar-dynamic [data-channel]"
    );

    items.forEach(el => {
        if (el.dataset.channel === channel) {
            el.classList.add("active");
        } else {
            el.classList.remove("active");
        }
    });
}

function switchChannel(c) {
    if (channel == c) return;
    channel = c;
    lastTs = 0;
    seen.clear();
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chan").innerText = c;
    fetchMessages();
    updateSidebarActive();
}

// Fetch Messages
function fetchMessages() {
    fetch(`/messages/${channel}?after=${lastTs}`)
        .then(r => r.json())
        .then(data => {
            const chat = document.getElementById("chat");

            data.forEach(m => {
                const d = document.createElement("div");
                d.className = "msg";

                const time = new Date(m.ts * 1000).toLocaleTimeString();
                const color = userColor(m.sender);

                d.innerHTML = `
                    <span class="time">[${time}]</span>
                    <span class="user" style="color:${color}">${m.sender}</span>:
                    <span class="text">${m.content}</span>
                `;

                chat.appendChild(d);
                lastTs = Math.max(lastTs, m.ts);
            });

            if (data.length) {
                chat.scrollTop = chat.scrollHeight;
            }
        });
}

// Edit message
function editMsg(id, text) {
    fetch(`/edit/${id}`, {
        method: "POST",
        body: new URLSearchParams({text})
    });
}

// Send messages
const msgBox = document.getElementById("msg");

msgBox.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function send() {
    const text = msgBox.value.trim();
    if (!text) return;

    fetch(`/send/${channel}`, {
        method: "POST",
        body: new URLSearchParams({text})
    });

    msgBox.value = "";
}

// Direct Messages
const dmModal = document.getElementById("dm-modal");

document.getElementById("new-dm-btn").onclick = () => {
    dmModal.classList.remove("hidden");
};

document.getElementById("dm-cancel").onclick = () => {
    dmModal.classList.add("hidden");
};

document.getElementById("dm-start").onclick = () => {
    const raw = document.getElementById("dm-users").value.trim();
    if (!raw) return;

    const users = raw
        .split(",")
        .map(u => u.trim())
        .filter(Boolean);

    if (!users.length) return;

    // Always include yourself
    if (!users.includes(CURRENT_USER)) {
        users.push(CURRENT_USER);
    }

    users.sort(); // IMPORTANT: consistent channel naming

    const dmChannel = "dm:" + users.join(":");

    dmModal.classList.add("hidden");
    document.getElementById("dm-users").value = "";

    switchChannel(dmChannel);
};

// Starup
document.addEventListener("DOMContentLoaded", () => {
    loadSidebar();
    switchChannel(channel);
    setInterval(fetchMessages, 500);
});

</script>
</body>
</html>
