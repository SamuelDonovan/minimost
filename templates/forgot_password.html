<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Forgot Password – MiniMost</title>
    <link rel="stylesheet" href="../static/auth.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
</head>
<body>
    <div class="auth-brand">MiniMost</div>
    <div class="auth-card">
        <h2>Forgot password?</h2>
        <p class="auth-body">Enter your username and we'll send a reset link to your registered email address.</p>
        <form method="post">
            <div class="auth-field">
                <input name="username" placeholder="Username" required autocomplete="username">
            </div>
            <button type="submit">Send reset link</button>
        </form>
        <p class="auth-footer"><a href="/login">Back to login</a></p>
    </div>
</body>
</html>
