; MiniMost package metadata in setup.cfg (declarative) rather than pyproject's
; [project] table. This is deliberate for cross-distro RPM builds: RHEL/EPEL 8
; ships setuptools 39 and EPEL 9 ships 53, both far older than the 61+ needed to
; read a [project] table — but setup.cfg has been readable since setuptools 30,
; so one metadata source builds everywhere from EL8 through current Fedora.
;
; The version is kept in lockstep with src/minimost/_version.py (and the spec and
; tag) by bump-my-version — do not edit it by hand. See [tool.bumpversion] in
; pyproject.toml.
[metadata]
name = minimost
version = 0.0.3
description = Lightweight self-hosted collaboration platform for messaging
long_description = file: README.md
long_description_content_type = text/markdown
license = MIT
license_files = LICENSE

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.6
install_requires =
    flask

[options.packages.find]
where = src

[options.entry_points]
console_scripts =
    minimost = minimost.__main__:main

[options.extras_require]
; black and ruff are pinned so pre-commit, CI (build.yml/ruff.yml), and local dev
; all format/lint identically; bump each in all three places together.
dev =
    black==26.3.1
    ruff==0.15.16
    pytest
    pytest-cov
    vermin
    bump-my-version
docs =
    sphinx>=7
    sphinx-rtd-theme>=2
    sphinxcontrib-httpdomain>=1.8

[options.package_data]
minimost =
    templates/*
    static/*
    static/reactions/*
    settings.json
