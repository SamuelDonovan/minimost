<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login – MiniMost</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
</head>
<body>
    <div class="auth-brand">Mini<span style="color:#007acc">Most</span></div>
    <div class="auth-card">
        <h2>Log in</h2>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" autocomplete="on">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="auth-field">
                <input id="username" type="text" name="username" placeholder="Username" required autocomplete="username" {% if not error %}autofocus{% endif %} value="{{ username or '' }}">
                <input name="password" type="password" placeholder="Password" required autocomplete="current-password" maxlength="1024" {% if error %}autofocus{% endif %}>
            </div>
            <button type="submit">Log in</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="/signup">Sign up</a>
        </p>
        <p class="auth-footer">
            <a href="/forgot-password">Forgot your password?</a>
        </p>
    </div>
    <div class="version-tag"># v{{ app_version }}</div>
    <script src="{{ url_for('static', filename='auth-password-field.js') }}"></script>
</body>
</html>
