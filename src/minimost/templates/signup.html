<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign Up – MiniMost</title>
    <link rel="stylesheet" href="../static/auth.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
</head>
<body>
    <div class="auth-brand">Mini<span style="color:#007acc">Most</span></div>
    <div class="auth-card">
        <h2>Create account</h2>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" autocomplete="on" onsubmit="return checkPasswords()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="auth-field">
                <input id="username" type="text" name="username" placeholder="Username" required autocomplete="username">
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Password"
                    required
                    autocomplete="new-password"
                    oninput="checkPasswords()"
                >
                <ul id="password-requirements" class="pw-reqs" hidden>
                    <li id="req-length"><span class="req-icon">•</span> 8+ characters</li>
                    <li id="req-upper"><span class="req-icon">•</span> One uppercase letter</li>
                    <li id="req-number"><span class="req-icon">•</span> One number</li>
                    <li id="req-special"><span class="req-icon">•</span> One special character</li>
                </ul>
                <input
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    placeholder="Confirm password"
                    required
                    autocomplete="new-password"
                    oninput="checkPasswords()"
                >
            </div>

            <p id="password-message"></p>
            <p class="auth-hint">Use your name as your username — this is how others will see and search for you.</p>

            <button id="signup-btn" type="submit" disabled>Sign up</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
    <div class="version-tag"># v{{ app_version }}</div>

    <script>
    function setReq(id, met, active) {
        const el = document.getElementById(id);
        let icon;
        if (met) icon = "✓";
        else if (active) icon = "✗";
        else icon = "•";
        el.querySelector(".req-icon").textContent = icon;
        let cls;
        if (met) cls = "req-met";
        else if (active) cls = "req-unmet";
        else cls = "";
        el.className = cls;
    }

    function checkPasswords() {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm_password").value;
        const message = document.getElementById("password-message");
        const button = document.getElementById("signup-btn");
        const reqs = document.getElementById("password-requirements");

        const active = password.length > 0;
        reqs.hidden = !active;

        const hasLength  = password.length >= 8;
        const hasUpper   = /[A-Z]/.test(password);
        const hasNumber  = /\d/.test(password);
        const hasSpecial = /[!@#$%^&*()\-_=+[\]{};':"\\|,.<>/?`~]/.test(password);

        setReq("req-length",  hasLength,  active);
        setReq("req-upper",   hasUpper,   active);
        setReq("req-number",  hasNumber,  active);
        setReq("req-special", hasSpecial, active);

        const requirementsMet = hasLength && hasUpper && hasNumber && hasSpecial;

        if (!active && !confirm) {
            message.textContent = "";
            message.className = "";
            button.disabled = true;
            return false;
        }

        const passwordsMatch = confirm.length > 0 && password === confirm;

        if (confirm.length > 0) {
            message.textContent = passwordsMatch ? "✓ Passwords match" : "✗ Passwords do not match";
            message.className   = passwordsMatch ? "match" : "no-match";
        } else {
            message.textContent = "";
            message.className = "";
        }

        button.disabled = !(requirementsMet && passwordsMatch);
        return requirementsMet && passwordsMatch;
    }
    </script>
</body>
</html>
