<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign Up – MiniMost</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
</head>
<body>
    <div class="auth-brand">Mini<span style="color:#007acc">Most</span></div>
    <div class="auth-card">
        <h2>Create account</h2>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" autocomplete="on">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="auth-field">
                <input id="username" type="text" name="username" placeholder="Username" required autocomplete="username" autofocus value="{{ username or '' }}">
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Password"
                    required
                    autocomplete="new-password"
                    maxlength="1024"
                >
                <ul id="password-requirements" class="pw-reqs" hidden>
                    <li id="req-length"><span class="req-icon">•</span> 8+ characters</li>
                    <li id="req-upper"><span class="req-icon">•</span> One uppercase letter</li>
                    <li id="req-number"><span class="req-icon">•</span> One number</li>
                    <li id="req-special"><span class="req-icon">•</span> One special character</li>
                </ul>
                <input
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    placeholder="Confirm password"
                    required
                    autocomplete="new-password"
                    maxlength="1024"
                >
            </div>

            <p id="password-message" aria-live="polite"></p>
            <p class="auth-hint">Use your name as your username — this is how others will see and search for you.</p>

            <button id="signup-btn" type="submit" disabled>Sign up</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
    <div class="version-tag"># v{{ app_version }}</div>

    <script src="{{ url_for('static', filename='auth-password-rules.js') }}"></script>
    <script src="{{ url_for('static', filename='auth-password-field.js') }}"></script>
</body>
</html>
